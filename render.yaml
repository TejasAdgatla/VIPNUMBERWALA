projects:
  - name: VipNumberWala
    environments:
      - name: Production
        envVarGroups:
          - name: vip-secrets
        services:
          # ─── BACKEND + WHATSAPP BOT ──────────────────────────────
          - type: web
            name: vip-backend
            env: docker
            plan: free
            region: singapore
            envVars:
              - key: PORT
                value: 3001
              - key: NODE_ENV
                value: production
              - fromGroup: vip-secrets

          # ─── FRONTEND (Static Site) ──────────────────────────────
          - type: web
            name: vip-frontend
            runtime: static
            buildCommand: npm run build
            staticPublishPath: ./dist
            envVars:
              - key: VITE_API_URL
                fromService:
                  type: web
                  name: vip-backend
                  property: host
              - key: VITE_WS_URL
                fromService:
                  type: web
                  name: vip-backend
                  property: host
