services:
  # ─── BACKEND + WHATSAPP BOT (Web Service) ──────────────────────────
  - type: web
    name: vip-backend
    env: docker
    plan: free # Note: free tier will spin down. Consider 'starter' for 24/7.
    region: singapore # Choose closest to you
    envVars:
      - key: PORT
        value: 3001
      - key: NODE_ENV
        value: production
      - fromGroup: vip-secrets # Create this group in Render dashboard

  # ─── FRONTEND (Static Site) ────────────────────────────────────────
  - type: web
    name: vip-frontend
    runtime: static
    buildCommand: npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: vip-backend
          property: host
      - key: VITE_WS_URL
        fromService:
          type: web
          name: vip-backend
          property: host
        # Note: Render static sites auto-inject HTTPS

envVarGroups:
  - name: vip-secrets
    envVars:
      - key: SUPABASE_URL
      - key: SUPABASE_ANON_KEY
      - key: CASHFREE_CLIENT_ID
      - key: CASHFREE_CLIENT_SECRET
      - key: CASHFREE_BASE_URL
      - key: VITE_CASHFREE_MODE
      - key: CASHFREE_RETURN_URL

